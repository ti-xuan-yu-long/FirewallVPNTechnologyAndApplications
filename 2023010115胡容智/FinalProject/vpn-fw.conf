[Interface]
# VPN 网关在隧道内的私有三层通信地址
Address = 192.168.100.1/24

# 本地高位 UDP 协商监听端口（必须在防火墙 INPUT 链中显式放行）
ListenPort = 51820

# 边界网关服务端的私钥（通过 wg genkey 生成，需严格保密）
PrivateKey = <边界防火墙网关生成的私钥_FW_PRIVATE_KEY>

[Peer]
# 远程办公员工端 (Remote) 的公钥（用于解密和对等体身份鉴权）
PublicKey = <远程办公端生成的公钥_REMOTE_PUBLIC_KEY>

# 零信任粒度路由控制（Cryptokey Routing）：
# 严格限定该 Peer 仅能通过 192.168.100.2 这个单 IP 接入隧道，杜绝任何中间人路由欺骗
AllowedIPs = 192.168.100.2/32