#!/bin/bash
# vpn-fw.conf - VPN服务端配置生成脚本
# 功能：生成fw端WireGuard配置文件
# 作者：[学号] [姓名]
# 日期：2026-06-29

set -e

GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m'

echo "========================================="
echo "  VPN服务端配置生成"
echo "========================================="

# ---------- 1. 生成密钥 ----------
echo -e "${YELLOW}[1/4] 生成WireGuard密钥对...${NC}"

# 如果在setup.sh中已生成，则跳过
if [ ! -f fw.key ] || [ ! -f fw.pub ] || [ ! -f remote.key ] || [ ! -f remote.pub ]; then
    echo "  生成新密钥对..."
    umask 077
    wg genkey | tee fw.key | wg pubkey > fw.pub
    wg genkey | tee remote.key | wg pubkey > remote.pub
else
    echo "  使用已有密钥对"
fi

FW_PRIVATE_KEY=$(cat fw.key)
FW_PUBLIC_KEY=$(cat fw.pub)
REMOTE_PUBLIC_KEY=$(cat remote.pub)

echo "  ✓ 密钥准备完成"

# ---------- 2. 创建服务端配置 ----------
echo -e "${YELLOW}[2/4] 创建服务端配置文件...${NC}"

sudo tee /etc/wireguard/fw/wg0.conf > /dev/null <<EOF
[Interface]
Address = 10.10.10.1/24
PrivateKey = ${FW_PRIVATE_KEY}
ListenPort = 51820
SaveConfig = false

[Peer]
PublicKey = ${REMOTE_PUBLIC_KEY}
AllowedIPs = 10.10.10.2/32
PersistentKeepalive = 25
EOF

sudo chmod 600 /etc/wireguard/fw/wg0.conf
echo "  ✓ 服务端配置: /etc/wireguard/fw/wg0.conf"

# ---------- 3. 显示配置 ----------
echo -e "${YELLOW}[3/4] 配置信息...${NC}"
echo ""
echo "--- 服务端配置 ---"
echo "接口地址: 10.10.10.1/24"
echo "监听端口: 51820"
echo "客户端公钥: ${REMOTE_PUBLIC_KEY}"
echo "客户端AllowedIPs: 10.10.10.2/32"
echo ""

# ---------- 4. 显示启动命令 ----------
echo -e "${YELLOW}[4/4] 启动命令...${NC}"
echo ""
echo "在fw namespace中启动VPN:"
echo "  sudo ip netns exec fw wg-quick up /etc/wireguard/fw/wg0.conf"
echo ""
echo "查看状态:"
echo "  sudo ip netns exec fw wg show"
echo ""
echo "停止VPN:"
echo "  sudo ip netns exec fw wg-quick down wg0"

echo ""
echo -e "${GREEN}========================================="
echo "  ✓ VPN服务端配置完成！"
echo "=========================================${NC}"
