#!/bin/bash
# vpn-remote.conf - VPN客户端配置生成脚本
# 功能：生成remote端WireGuard配置文件
# 作者：[学号] [姓名]
# 日期：2026-06-29

set -e

GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m'

echo "========================================="
echo "  VPN客户端配置生成"
echo "========================================="

# ---------- 1. 检查密钥 ----------
echo -e "${YELLOW}[1/4] 检查密钥...${NC}"

if [ ! -f fw.key ] || [ ! -f fw.pub ] || [ ! -f remote.key ] || [ ! -f remote.pub ]; then
    echo -e "${RED}错误: 密钥文件不存在！${NC}"
    echo "请先执行 vpn-fw.conf 生成密钥"
    exit 1
fi

REMOTE_PRIVATE_KEY=$(cat remote.key)
FW_PUBLIC_KEY=$(cat fw.pub)

echo "  ✓ 密钥准备完成"

# ---------- 2. 创建客户端配置 ----------
echo -e "${YELLOW}[2/4] 创建客户端配置文件...${NC}"

sudo tee /etc/wireguard/remote/wg0.conf > /dev/null <<EOF
[Interface]
Address = 10.10.10.2/24
PrivateKey = ${REMOTE_PRIVATE_KEY}
DNS = 8.8.8.8
SaveConfig = false

[Peer]
PublicKey = ${FW_PUBLIC_KEY}
Endpoint = 203.0.113.1:51820
AllowedIPs = 10.20.0.0/24,10.40.0.0/24
PersistentKeepalive = 25
EOF

sudo chmod 600 /etc/wireguard/remote/wg0.conf
echo "  ✓ 客户端配置: /etc/wireguard/remote/wg0.conf"

# ---------- 3. 显示配置信息 ----------
echo -e "${YELLOW}[3/4] 配置信息...${NC}"
echo ""
echo "--- 客户端配置 ---"
echo "接口地址: 10.10.10.2/24"
echo "服务端公钥: ${FW_PUBLIC_KEY}"
echo "服务端地址: 203.0.113.1:51820"
echo "AllowedIPs: 10.20.0.0/24, 10.40.0.0/24"
echo ""
echo "--- 路由说明 ---"
echo "只有访问以下网段的流量走VPN隧道："
echo "  - 10.20.0.0/24 (办公网)"
echo "  - 10.40.0.0/24 (DMZ)"
echo "其他流量（如互联网访问）不走VPN"
echo ""

# ---------- 4. 显示启动命令 ----------
echo -e "${YELLOW}[4/4] 启动命令...${NC}"
echo ""
echo "在remote namespace中启动VPN:"
echo "  sudo ip netns exec remote wg-quick up /etc/wireguard/remote/wg0.conf"
echo ""
echo "查看状态:"
echo "  sudo ip netns exec remote wg show"
echo ""
echo "查看路由:"
echo "  sudo ip netns exec remote ip route"
echo ""
echo "停止VPN:"
echo "  sudo ip netns exec remote wg-quick down wg0"

echo ""
echo -e "${GREEN}========================================="
echo "  ✓ VPN客户端配置完成！"
echo "=========================================${NC}"
